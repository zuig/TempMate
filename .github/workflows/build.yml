name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            $v = "${{ github.ref_name }}".Substring(1)
            "args=-p:Version=$v -p:FileVersion=$v.0 -p:AssemblyVersion=$v.0" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "args=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Restore
        run: dotnet restore TempMate/TempMate.csproj

      - name: Build
        run: dotnet build TempMate/TempMate.csproj -c Release --no-restore ${{ steps.ver.outputs.args }}

      - name: Publish framework-dependent single-file
        run: dotnet publish TempMate/TempMate.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o publish ${{ steps.ver.outputs.args }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TempMate-win-x64
          path: |
            publish/TempMate.exe
            publish/TempMate.Launcher.cmd
            publish/*.dll
          if-no-files-found: error

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: TempMate-win-x64
          path: publish

      - name: Create release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path publish/* -DestinationPath dist/TempMate-win-x64.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TempMate-win-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
